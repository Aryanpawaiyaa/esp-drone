name: Build project
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Build project
        shell: powershell
        run: |
          # 1. Directly source the tools from your specific Espressif folder
          . "C:\Espressif\frameworks\esp-idf-v5.1.2\export.ps1"
          
          # 2. Move to your project folder
          cd "E:\robotics projects\esp-drone-master (1)\esp-drone-master"
          
          # 3. Compile the project
          idf.py build
